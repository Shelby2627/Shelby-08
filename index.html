<html lang="sw">
<head>

    <style>
        :root {
            --primary: #0f4c3a;
            --primary-light: #1a7a5e;
            --secondary: #c17b3f;
            --accent: #d4af37;
            --danger: #991b1b;
            --warning: #d97706;
            --success: #059669;
            --bg: #fdfcfb;
            --card: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom right, #fdfcfb, #f5f3ef);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Language Switcher */
        .lang-switcher {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: var(--card);
            border-radius: 25px;
            padding: 5px;
            box-shadow: 0 4px 15px var(--shadow);
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        .lang-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        /* Header */
        header {
            text-align: center;
            margin: 60px 0 40px;
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Main Card */
        .main-card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px var(--shadow);
            margin-bottom: 30px;
        }

        /* Selection Section */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        select, input {
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 76, 58, 0.1);
        }

        /* Courses Input */
        .courses-section {
            margin-top: 30px;
        }

        .courses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .courses-header h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .credit-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .course-grid {
            display: grid;
            gap: 15px;
        }

        .course-item {
            display: grid;
            grid-template-columns: 1fr 100px 100px;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .course-item:hover {
            background: #f3f4f6;
            border-color: var(--primary-light);
        }

        .course-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .course-code {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .course-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .course-credits {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 600;
        }

        .marks-input {
            position: relative;
        }

        .marks-input input {
            width: 100%;
            text-align: center;
            font-weight: 600;
        }

        .gp-display {
            text-align: center;
            font-weight: 600;
            color: var(--primary);
            padding: 12px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
        }

        /* Calculate Button */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        /* Results Section */
        .results-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid var(--border);
        }

        .results-section.show {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .result-card {
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Crimson Pro', serif;
            color: var(--primary);
        }

        .result-grade {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Status Card */
        .status-card {
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid;
            text-align: center;
        }

        .status-card.safe {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border-color: var(--success);
        }

        .status-card.danger {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border-color: var(--danger);
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .status-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Crimson Pro', serif;
        }

        .status-card.safe .status-title {
            color: var(--success);
        }

        .status-card.danger .status-title {
            color: var(--danger);
        }

        .status-message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Target Calculator */
        .target-section {
            margin-top: 25px;
            padding: 25px;
            background: #fffbeb;
            border: 2px solid var(--warning);
            border-radius: 15px;
        }

        .target-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--warning);
            margin-bottom: 15px;
            font-family: 'Crimson Pro', serif;
        }

        .target-info {
            font-size: 1rem;
            color: var(--text);
            line-height: 1.6;
        }

        .target-gpa {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--warning);
            margin: 10px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .course-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .selection-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .main-card {
                padding: 20px;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Loading state */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        // ==========================================
        // GRADE POINT CALCULATION
        // ==========================================
        function calculateGP(marks) {
            const x = parseFloat(marks);
            
            if (isNaN(x) || x < 0 || x > 100) return 0;
            
            if (x >= 75 && x <= 100) {
                // A: Y = 0.024x + 2.6
                return 0.024 * x + 2.6;
            } else if (x >= 70 && x < 75) {
                // B+: Y = 0.2x - 10.5
                return 0.2 * x - 10.5;
            } else if (x >= 60 && x < 70) {
                // B: Y = 0.08x - 2.1
                return 0.08 * x - 2.1;
            } else if (x >= 50 && x < 60) {
                // C: Y = 0.07x - 1.5
                return 0.07 * x - 1.5;
            } else if (x >= 40 && x < 50) {
                // D: Y = 0.04x - 0.1
                return 0.04 * x - 0.1;
            } else {
                // E: Y = (1/28)x
                return (1/28) * x;
            }
        }

        function getLetterGrade(gp) {
            if (gp >= 4.4 && gp <= 5.0) return 'A';
            if (gp >= 3.5 && gp < 4.4) return 'B+';
            if (gp >= 2.7 && gp < 3.5) return 'B';
            if (gp >= 2.0 && gp < 2.7) return 'C';
            if (gp >= 1.5 && gp < 2.0) return 'D';
            return 'E';
        }

        // ==========================================
        // LANGUAGE SWITCHER
        // ==========================================
        function updateLanguage(lang) {
            currentLang = lang;
            
            // Update all translatable elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        // ==========================================
        // PROGRAM & SEMESTER SELECTION
        // ==========================================
        const programSelect = document.getElementById('program');
        const semesterSelect = document.getElementById('semester');
        const coursesSection = document.getElementById('coursesSection');
        const courseGrid = document.getElementById('courseGrid');
        const totalCreditsEl = document.getElementById('totalCredits');

        programSelect.addEventListener('change', function() {
            const program = this.value;
            semesterSelect.disabled = !program;
            semesterSelect.innerHTML = `<option value="">${translations[currentLang].choosePlaceholder}</option>`;
            coursesSection.classList.add('hidden');
            
            if (program && programData[program]) {
                const semesters = programData[program].semesters;
                for (let i = 1; i <= semesters; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Semester ${i}`;
                    semesterSelect.appendChild(option);
                }
            }
        });

        semesterSelect.addEventListener('change', function() {
            const program = programSelect.value;
            const semester = parseInt(this.value);
            
            if (program && semester && programData[program].data[semester]) {
                loadCourses(program, semester);
                coursesSection.classList.remove('hidden');
                document.getElementById('resultsSection').classList.remove('show');
            }
        });

        function loadCourses(program, semester) {
            const data = programData[program].data[semester];
            courseGrid.innerHTML = '';
            totalCreditsEl.textContent = data.credits.toFixed(1);
            
            data.courses.forEach((course, index) => {
                const courseItem = document.createElement('div');
                courseItem.className = 'course-item';
                courseItem.innerHTML = `
                    <div class="course-info">
                        <div class="course-code">${course.code}</div>
                        <div class="course-name">${course.name}</div>
                        <div class="course-credits">${course.credits} ${translations[currentLang].credits}</div>
                    </div>
                    <div class="marks-input">
                        <input type="number" 
                               class="marks" 
                               min="0" 
                               max="100" 
                               step="0.1"
                               placeholder="${translations[currentLang].marks}"
                               data-index="${index}"
                               data-credits="${course.credits}">
                    </div>
                    <div class="gp-display" data-gp="${index}">-</div>
                `;
                courseGrid.appendChild(courseItem);
            });

            // Add event listeners to marks inputs
            document.querySelectorAll('.marks').forEach(input => {
                input.addEventListener('input', function() {
                    const index = this.dataset.index;
                    const marks = parseFloat(this.value);
                    const gpDisplay = document.querySelector(`[data-gp="${index}"]`);
                    
                    if (!isNaN(marks) && marks >= 0 && marks <= 100) {
                        const gp = calculateGP(marks);
                        gpDisplay.textContent = gp.toFixed(2);
                    } else {
                        gpDisplay.textContent = '-';
                    }
                });
            });
        }

        // ==========================================
        // CALCULATE GPA
        // ==========================================
        document.getElementById('calculateBtn').addEventListener('click', function() {
            const marksInputs = document.querySelectorAll('.marks');
            let totalScore = 0;
            let totalCredits = 0;
            let validCount = 0;

            marksInputs.forEach(input => {
                const marks = parseFloat(input.value);
                const credits = parseFloat(input.dataset.credits);
                
                if (!isNaN(marks) && marks >= 0 && marks <= 100) {
                    const gp = calculateGP(marks);
                    const score = gp * credits;
                    totalScore += score;
                    totalCredits += credits;
                    validCount++;
                }
            });

            if (validCount === 0) {
                alert(currentLang === 'sw' ? 'Tafadhali ingiza marks!' : 'Please enter marks!');
                return;
            }

            const gpa = totalScore / totalCredits;
            const letterGrade = getLetterGrade(gpa);
            const avgGP = totalScore / totalCredits;

            // Display results
            document.getElementById('semesterGPA').textContent = gpa.toFixed(2);
            document.getElementById('semesterGrade').textContent = letterGrade;
            document.getElementById('totalScore').textContent = totalScore.toFixed(2);
            document.getElementById('avgGP').textContent = avgGP.toFixed(2);

            // Status card
            const statusCard = document.getElementById('statusCard');
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');

            if (gpa >= 3.8) {
                statusCard.className = 'status-card safe';
                statusIcon.textContent = '🎉';
                statusTitle.textContent = translations[currentLang].safeZone;
                statusMessage.textContent = translations[currentLang].safeMessage;
                document.getElementById('targetSection').classList.add('hidden');
            } else {
                statusCard.className = 'status-card danger';
                statusIcon.textContent = '⚠️';
                statusTitle.textContent = translations[currentLang].dangerZone;
                statusMessage.textContent = translations[currentLang].dangerMessage;
                
                // Calculate target for next semester
                showTargetRecommendation(gpa, totalCredits);
            }

            document.getElementById('resultsSection').classList.add('show');
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        });

        function showTargetRecommendation(currentGPA, currentCredits) {
            const targetSection = document.getElementById('targetSection');
            const targetInfo = document.getElementById('targetInfo');
            const targetGPA = 3.8;
            
            // Assuming next semester has similar credits (average ~65.8)
            const nextSemesterCredits = 65.8;
            const totalCreditsAfter = currentCredits + nextSemesterCredits;
            
            // Calculate required GPA for next semester
            // targetGPA = (currentGPA * currentCredits + nextGPA * nextCredits) / totalCredits
            // nextGPA = (targetGPA * totalCredits - currentGPA * currentCredits) / nextCredits
            const requiredNextGPA = (targetGPA * totalCreditsAfter - currentGPA * currentCredits) / nextSemesterCredits;
            
            targetSection.classList.remove('hidden');
            
            if (requiredNextGPA > 5.0) {
                targetInfo.innerHTML = currentLang === 'sw' 
                    ? translations.sw.targetImpossible
                    : translations.en.targetImpossible;
            } else if (requiredNextGPA <= 0) {
                targetInfo.innerHTML = currentLang === 'sw'
                    ? translations.sw.targetAlready
                    : translations.en.targetAlready;
            } else {
                targetInfo.innerHTML = `
                    ${translations[currentLang].targetNeed} 
                    <div class="target-gpa">${requiredNextGPA.toFixed(2)}</div>
                    ${translations[currentLang].targetNext}
                `;
            }
        }

        // ==========================================
        // RESET BUTTON
        // ==========================================
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm(currentLang === 'sw' ? 'Je, una uhakika unataka kufuta data zote?' : 'Are you sure you want to reset all data?')) {
                document.querySelectorAll('.marks').forEach(input => {
                    input.value = '';
                });
                document.querySelectorAll('[data-gp]').forEach(el => {
                    el.textContent = '-';
                });
                document.getElementById('resultsSection').classList.remove('show');
            }
        });

        // ==========================================
        // INITIALIZE
        // ==========================================
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                updateLanguage(this.dataset.lang);
            });
        });

        // Set initial language
        updateLanguage('sw');
